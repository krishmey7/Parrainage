{% extends 'base.html' %}
{% load static %}

{% block contenu %}
<div class="page-modern">
    <div class="page-header-compact">
        <h1>Nouveau Dépôt</h1>
        <p class="text-muted">Déposez vos fonds en toute sécurité</p>
    </div>

    <div class="page-grid">
        <!-- Formulaire - 3 colonnes -->
        <div class="card-modern form-card" style="grid-column: span 3;">
            <div class="card-header-compact">
                <span class="card-label">Informations du dépôt</span>
            </div>
            <form method="post" class="form-compact">
                {% csrf_token %}
                
                <div class="form-row">
                    <div class="form-group-compact">
                        <label for="methode" class="form-label-compact">
                            <i class="fas fa-wallet"></i> Méthode
                        </label>
                        <select id="methode" name="name" class="form-input-compact" required>
                            <option value="">-- Sélectionnez --</option>
                            <option value="Orange_money">Orange Money</option>
                            <option value="M_pesa">M-pesa</option>
                            <option value="Airtel_money">Airtel Money</option>
                        </select>
                    </div>

                    <div class="form-group-compact">
                        <label for="montant" class="form-label-compact">
                            <i class="fas fa-coins"></i> Montant (FC)
                        </label>
                        <input type="number" id="montant" name="amount" class="form-input-compact" 
                               step="0.01" min="1" placeholder="Montant" required>
                    </div>
                </div>

                <button type="submit" class="btn-compact btn-primary" style="width: 100%; margin-top: var(--spacing-md);">
                    <i class="fas fa-arrow-right"></i>
                    <span>Continuer</span>
                </button>
            </form>
        </div>

        <!-- Instructions - 1 colonne -->
        <div class="card-modern info-card">
            <div class="card-header-compact">
                <span class="card-label">Instructions</span>
            </div>
            <div class="info-list-compact">
                <div class="info-item-compact">
                    <div class="info-icon-compact" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="info-text-compact">
                        <div class="info-title">Code ref requis</div>
                        <div class="info-desc">Entrez votre référence après le dépôt</div>
                    </div>
                </div>
                <div class="info-item-compact">
                    <div class="info-icon-compact" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="info-text-compact">
                        <div class="info-title">Orange Money</div>
                        <div class="info-desc">0858009376</div>
                    </div>
                </div>
                <div class="info-item-compact">
                    <div class="info-icon-compact" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6;">
                        <i class="fas fa-question-circle"></i>
                    </div>
                    <div class="info-text-compact">
                        <div class="info-title">Besoin d'aide ?</div>
                        <a href="{% url 'comment_faire_un_depot' %}" class="info-link">Guide dépôt</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.page-modern {
    padding: var(--spacing-md);
    max-width: 1400px;
    margin: 0 auto;
}

.page-header-compact {
    margin-bottom: var(--spacing-lg);
}

.page-header-compact h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.25rem;
}

.page-header-compact .text-muted {
    color: var(--text-muted);
    font-size: 0.875rem;
}

.page-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--spacing-md);
}

.form-card {
    padding: var(--spacing-lg);
}

.form-compact {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-md);
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--spacing-md);
}

.form-group-compact {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-xs);
}

.form-label-compact {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
}

.form-label-compact i {
    color: var(--primary);
}

.form-input-compact {
    width: 100%;
    padding: 0.75rem var(--spacing-md);
    background: var(--bg-elevated);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius);
    color: var(--text-primary);
    font-size: 0.9rem;
    transition: var(--transition);
    font-family: var(--font-sans);
}

.form-input-compact:focus {
    outline: none;
    border-color: var(--primary);
    background: var(--bg-card);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.info-card {
    padding: var(--spacing-md);
}

.info-list-compact {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-md);
}

.info-item-compact {
    display: flex;
    align-items: flex-start;
    gap: var(--spacing-sm);
    padding: var(--spacing-sm);
    border-radius: var(--border-radius);
    transition: var(--transition);
}

.info-item-compact:hover {
    background: var(--bg-secondary);
}

.info-icon-compact {
    width: 36px;
    height: 36px;
    border-radius: var(--border-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
}

.info-text-compact {
    flex: 1;
}

.info-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 0.125rem;
}

.info-desc {
    font-size: 0.75rem;
    color: var(--text-muted);
}

.info-link {
    font-size: 0.75rem;
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
}

.info-link:hover {
    color: var(--primary-hover);
}

.btn-compact {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--spacing-sm);
    padding: 0.75rem 1.5rem;
    border-radius: var(--border-radius);
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    transition: var(--transition);
    border: none;
    cursor: pointer;
}

.btn-compact.btn-primary {
    background: var(--primary);
    color: white;
    border: 1px solid var(--primary);
}

.btn-compact.btn-primary:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
}

@media (max-width: 1200px) {
    .page-grid {
        grid-template-columns: repeat(3, 1fr);
    }
    
    .form-card {
        grid-column: span 3 !important;
    }
    
    .info-card {
        grid-column: span 3 !important;
    }
}

@media (max-width: 768px) {
    .page-grid {
        grid-template-columns: 1fr;
    }
    
    .form-card,
    .info-card {
        grid-column: span 1 !important;
    }
    
    .form-row {
        grid-template-columns: 1fr;
    }
}
</style>
{% endblock %}
