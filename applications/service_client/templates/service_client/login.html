{% extends 'service_client/base.html' %}

{% block title %}Connexion - Service Client{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card card-custom fade-in">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="icon-circle blue mb-3">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <h2 class="fw-bold text-primary mb-2">Connexion</h2>
                    <p class="text-muted">Accédez à votre espace client</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">
                            <i class="bi bi-person me-1"></i>Nom d'utilisateur
                        </label>
                        <input type="text" 
                               class="form-control form-control-lg" 
                               id="username" 
                               name="username" 
                               required
                               placeholder="Entrez votre nom d'utilisateur">
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">
                            <i class="bi bi-lock me-1"></i>Mot de passe
                        </label>
                        <input type="password" 
                               class="form-control form-control-lg" 
                               id="password" 
                               name="password" 
                              
                               placeholder="Entrez votre mot de passe">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg btn-custom">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle me-2"></i>
                        <strong>Comptes de test :</strong><br>
                        <small>
                            Client : <code>client</code> / <code>client123</code><br>
                            Admin : <code>admin</code> / <code>admin123</code>
                        </small>
                    </div>
                </div>

                <div class="text-center mt-3">
                    <a href="{% url 'index' %}" class="text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
